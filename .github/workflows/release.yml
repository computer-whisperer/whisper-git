name: release

# Tag-driven release workflow. On every `v*.*.*` tag push:
#   1. builds whisper-git for Linux x86_64
#   2. packages binary + LICENSE + README + .desktop into a .tar.gz
#   3. creates a GitHub Release and attaches the tarball
#
# The merge-gate workflow (ci.yml) covers branch / PR validation and
# intentionally does NOT run on tag pushes — the tagged commit was
# already verified when it landed on main.
#
# Tagging procedure (after the relevant commits are on main):
#   1. Bump `version` in Cargo.toml; commit.
#   2. `git tag vX.Y.Z && git push --tags`
#   3. This workflow runs and publishes the release.
#   4. (AUR) bump pkgver in packaging/aur/PKGBUILD, run updpkgsums,
#      regenerate .SRCINFO, push to the AUR remote.
#
# A `-` in the tag (e.g. v0.2.0-rc1) marks the release as a prerelease.

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # softprops/action-gh-release creates/updates releases

jobs:
  linux:
    name: Linux x86_64 tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Same set used by ci.yml — Vulkan loader + Wayland/xkbcommon for
      # winit + dbus for the secret-service keyring backend.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libdbus-1-dev

      - name: Build release binary
        run: cargo build --release --locked

      # Stage everything a user needs to drop into ~/.local/bin and run.
      # Strip to keep the tarball small; debug symbols aren't useful to
      # end users without a matching toolchain anyway.
      - name: Stage tarball
        id: stage
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          stage="whisper-git-${version}-x86_64-linux"
          mkdir -p "$stage"
          install -m755 target/release/whisper-git "$stage/whisper-git"
          strip "$stage/whisper-git"
          install -m644 README.md "$stage/README.md"
          install -m644 LICENSE-MIT "$stage/LICENSE-MIT"
          install -m644 LICENSE-APACHE "$stage/LICENSE-APACHE"
          install -m644 packaging/aur/whisper-git.desktop "$stage/whisper-git.desktop"
          tar -czf "${stage}.tar.gz" "$stage"
          sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          echo "tarball=${stage}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha256=${stage}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            ${{ steps.stage.outputs.tarball }}
            ${{ steps.stage.outputs.sha256 }}
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [linux]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64
          path: ./artifacts

      # Auto-creates the release if missing for this tag. `body` is
      # prepended to the auto-generated commit-log notes from
      # `generate_release_notes`.
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./artifacts/*.tar.gz
            ./artifacts/*.sha256
          # `-` in tag → prerelease (e.g. v0.2.0-rc1).
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ### Linux x86_64

            ```
            tar -xzf whisper-git-*-x86_64-linux.tar.gz
            cd whisper-git-*-x86_64-linux
            ./whisper-git
            ```

            Runtime requirements: a Vulkan-capable GPU + driver, Wayland or
            XWayland, libxkbcommon, dbus.

            ### Arch Linux (AUR)

            ```
            paru -S whisper-git   # or your AUR helper of choice
            ```
